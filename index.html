<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F0F6FF">
<title>Family Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
body{background:#F0F4FF;color:#1E293B;font-family:'Nunito',sans-serif}
input,textarea,select{font-family:'Nunito',sans-serif;outline:none;color:#1E293B}
select option{background:#fff}
::-webkit-scrollbar{display:none}
.card{background:#fff;border:1px solid rgba(59,130,246,0.15);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(59,130,246,0.06)}
.meal-row{padding:13px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.05)}
.meal-row:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;gap:3px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#3B82F6,#2563EB);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;box-shadow:0 4px 16px rgba(59,130,246,0.3);cursor:pointer}
.btn-outline{width:100%;padding:11px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.3);border-radius:10px;color:#3B82F6;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.btn-green{width:100%;padding:11px;background:rgba(22,163,74,0.08);border:1px solid rgba(22,163,74,0.3);border-radius:10px;color:#16A34A;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.inp{background:#F8FAFF;border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:9px 12px;font-size:13px;color:#1E293B}
.textarea{width:100%;background:#F8FAFF;border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:10px 12px;color:#1E293B;font-size:13px;font-family:'Nunito',sans-serif;resize:none;line-height:1.5}
.lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#94A3B8;font-weight:700;margin-bottom:8px;display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(59,130,246,0.12);display:flex;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
.nav-btn{flex:1;padding:10px 0;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.nav-icon{font-size:18px}
.nav-lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Nunito',sans-serif;color:#94A3B8}
.nav-btn.active .nav-lbl{color:#3B82F6}
.nav-dot{width:18px;height:2px;background:#3B82F6;border-radius:1px;display:none}
.nav-btn.active .nav-dot{display:block}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:100;display:flex;align-items:flex-end}
.modal{background:#fff;border:1px solid rgba(59,130,246,0.15);border-radius:22px 22px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,0.12)}
.mhandle{width:36px;height:4px;background:rgba(59,130,246,0.2);border-radius:2px;margin:12px auto 0}
.dish-chip{display:inline-block;padding:7px 12px;border-radius:20px;background:#F0F4FF;border:1px solid rgba(59,130,246,0.15);color:#1E293B;font-size:12px;cursor:pointer;margin:3px;user-select:none}
.dish-chip.sel{background:#3B82F6;border-color:#3B82F6;color:#fff;font-weight:700}
.shop-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:10px;margin-bottom:5px}
.chk{width:21px;height:21px;min-width:21px;border-radius:6px;border:1.5px solid rgba(59,130,246,0.3);background:transparent;cursor:pointer;flex-shrink:0}
.chk.done{background:#16A34A;border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.rule-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:#F8FAFF;border:1px solid rgba(59,130,246,0.12);border-radius:12px;margin-bottom:8px}
.setting-dish{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid rgba(0,0,0,0.05)}
.toggle-pill{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid;font-family:'Nunito',sans-serif;transition:all 0.15s}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:200;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:none;pointer-events:none}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
</style>
</head>

function getDishWeight(dish){
  const freq=ls("mp-dish-freq")||{};
  const dropped=ls("mp-dish-dropped")||{};
  return Math.max(0.2,1+((freq[dish]||0)*0.25)-((dropped[dish]||0)*0.4));
}
function weightedPick(arr){
  if(!arr||!arr.length)return null;
  const weights=arr.map(d=>getDishWeight(d));
  const total=weights.reduce((a,b)=>a+b,0);
  let rand=Math.random()*total;
  for(let i=0;i<arr.length;i++){rand-=weights[i];if(rand<=0)return arr[i];}
  return arr[arr.length-1];
}
function recordPlanUsage(plan){
  const freq={...(ls("mp-dish-freq")||{})};
  DAYS.forEach(day=>{
    const p=plan[day];if(!p)return;
    ["tiffin","lunch","dinner"].forEach(meal=>{
      const dishes=p[meal];if(dishes)dishes.forEach(dish=>{freq[dish]=(freq[dish]||0)+1;});
    });
  });
  ss("mp-dish-freq",freq);
}
function recordDishDropped(dish){
  if(!dish)return;
  const d={...(ls("mp-dish-dropped")||{})};
  d[dish]=(d[dish]||0)+1;ss("mp-dish-dropped",d);
}
function toKg(qty,unit){
  if(unit==="g") return qty/1000;
  if(unit==="kg") return qty;
  if(unit==="tbsp") return qty*0.015;
  if(unit==="tsp") return qty*0.005;
  return qty;
}
function toL(qty,unit){
  if(unit==="ml") return qty/1000;
  if(unit==="L") return qty;
  if(unit==="tbsp") return qty*0.015;
  return qty;
}

function getLivePrice(item){
  if(!S.livePrices)return null;
  const nm=item.name.toLowerCase();
  // exact
  if(S.livePrices[nm]!==undefined)return S.livePrices[nm];
  // partial
  for(const [k,v] of Object.entries(S.livePrices)){
    if(nm.includes(k)||k.includes(nm.split(" ")[0]))return v;
  }
  return null;
}

function getItemPrice(item){
  const live=getLivePrice(item);
  if(live!==null&&live!==undefined)return live;
  const nm=item.name.toLowerCase();
  let entry=null;
  // exact match first, then partial
  for(const [key,val] of Object.entries(PRICES)){
    if(nm===key){entry=val;break;}
  }
  if(!entry){
    for(const [key,val] of Object.entries(PRICES)){
      if(nm.includes(key)||key.split(" ")[0].length>3&&nm.includes(key.split(" ")[0])){
        entry=val;break;
      }
    }
  }
  if(!entry) return 5; // default 5 AED unknown items
  const [pricePerUnit,unit]=entry;
  const q=+item.qty||1;
  let converted;
  if(unit==="kg") converted=toKg(q,item.unit);
  else if(unit==="L") converted=toL(q,item.unit);
  else converted=q; // pcs, bunch etc
  return Math.max(0.5, Math.round(pricePerUnit*converted*10)/10);
}

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a.length?a[Math.floor(Math.random()*a.length)]:null;}
function getAllDishes(){const all={};Object.entries(CATS).forEach(([d,slots])=>all[d]={slots,dtype:DTYPE[d]||"sabzi"});Object.entries(S.custom).forEach(([d,v])=>all[d]={slots:v.slots,dtype:v.dtype||"sabzi"});return all;}

function filterByRules(dish,slot,rules){
  const t=dish.toLowerCase();
  for(const r of rules){
    const rt=r.text.toLowerCase();
    const sname=slot==="T"?"tiffin":slot==="L"?"lunch":"dinner";
    const m1=rt.match(/(.+?)\s+only\s+(?:at|for)\s+(tiffin|lunch|dinner)/);
    if(m1&&t.includes(m1[1].trim())&&m1[2]!==sname)return false;
    const m2=rt.match(/^(?:no|never)\s+(.+)/);
    if(m2&&t.includes(m2[1].trim()))return false;
    const m3=rt.match(/(.+?)\s+never\s+(?:at|for|in)\s+(tiffin|lunch|dinner)/);
    if(m3&&t.includes(m3[1].trim())&&m3[2]===sname)return false;
  }
  return true;
}

function smartPick(slot,used,rules){
  const all=getAllDishes();
  const avail=Object.keys(all).filter(d=>{
    const dt=all[d].dtype;
    if(dt==="dessert"||dt==="condiment")return false;
    if(slot==="T"&&!all[d].slots.includes("T"))return false;
    if(slot==="L"&&!all[d].slots.includes("L"))return false;
    if(slot==="D"&&!all[d].slots.includes("D"))return false;
    if(used.has(d))return false;
    return filterByRules(d,slot,rules);
  });
  if(!avail.length)return null;
  const byType=(t)=>avail.filter(d=>all[d].dtype===t);
  const dal=byType("dal"),sabzi=byType("sabzi"),gravy=byType("gravy"),
    standalone=byType("standalone"),paratha=byType("paratha"),
    rice=byType("rice"),tiffin=byType("tiffin"),snack=byType("snack");
  if(slot==="T"){
    const tp=[...paratha,...tiffin,...snack];
    const d=weightedPick(tp.length?tp:avail);
    if(d){used.add(d);return[d];}return null;
  }
  const pats=[];
  if(dal.length&&rice.length)pats.push(...Array(25).fill("dal+rice"));
  if(sabzi.length&&dal.length)pats.push(...Array(20).fill("sabzi+dal"));
  if(standalone.length)pats.push(...Array(18).fill("standalone"));
  if(paratha.length)pats.push(...Array(15).fill("paratha"));
  if(gravy.length&&rice.length)pats.push(...Array(10).fill("gravy+rice"));
  if(sabzi.length)pats.push(...Array(7).fill("sabzi"));
  if(gravy.length)pats.push(...Array(5).fill("gravy"));
  if(!pats.length){const d=pick(avail);if(d){used.add(d);return[d];}return null;}
  const pat=pick(shuffle(pats));let res=[];
  if(pat==="dal+rice"){const d=weightedPick(dal),r=weightedPick(rice.filter(x=>!used.has(x)));if(d&&r){res=[d,r];}else if(d)res=[d];}
  else if(pat==="sabzi+dal"){const s=weightedPick(sabzi),d=weightedPick(dal.filter(x=>x!==s&&!used.has(x)));if(s&&d){res=[s,d];}else if(s)res=[s];}
  else if(pat==="standalone"){const d=weightedPick(standalone);if(d)res=[d];}
  else if(pat==="paratha"){const d=weightedPick(paratha);if(d)res=[d];}
  else if(pat==="gravy+rice"){const g=weightedPick(gravy),r=weightedPick(rice.filter(x=>!used.has(x)));if(g&&r){res=[g,r];}else if(g)res=[g];}
  else if(pat==="sabzi"){const d=weightedPick(sabzi);if(d)res=[d];}
  else if(pat==="gravy"){const d=weightedPick(gravy);if(d)res=[d];}
  res.forEach(d=>used.add(d));
  return res.length?res:null;
}

function generatePlan(){
  const used=new Set();const plan={};
  const tiffinDays=new Set(shuffle([...DAYS]).slice(0,4));
  DAYS.forEach(day=>{
    plan[day]={
      tiffin:tiffinDays.has(day)?smartPick("T",used,S.rules):null,
      lunch:smartPick("L",used,S.rules)||[],
      dinner:smartPick("D",used,S.rules)||[]
    };
  });
  return plan;
}

// Smart feedback — only changes what feedback asks for, keeps rest intact
function applyFeedbackToPlan(text){
  text=text.toLowerCase();
  const plan=JSON.parse(JSON.stringify(S.plan));
  const used=new Set();
  DAYS.forEach(day=>["tiffin","lunch","dinner"].forEach(m=>{if(plan[day][m])plan[day][m].forEach(d=>used.add(d));}));
  const all=getAllDishes();let changed=0;
  // Find dish names mentioned
  const dishesMentioned=Object.keys(all).filter(d=>text.includes(d.toLowerCase()));
  // Find days mentioned
  const daysMentioned=DAYS.filter(d=>text.includes(DL[d].toLowerCase()));
  // Find meal types mentioned
  const mealMap=[["tiffin","T"],["lunch","L"],["dinner","D"]];
  const mealsMentioned=mealMap.filter(([m])=>text.includes(m));

  // 1. Swap specific dishes found by name
  if(dishesMentioned.length){
    dishesMentioned.forEach(dish=>{
      DAYS.forEach(day=>{
        mealMap.forEach(([mealKey,slot])=>{
          if(plan[day][mealKey]&&plan[day][mealKey].includes(dish)){
            used.delete(dish);
            const r=smartPick(slot,used,S.rules);
            if(r){plan[day][mealKey]=plan[day][mealKey].map(d=>d===dish?r[0]:d);r.forEach(d=>used.add(d));}
            else plan[day][mealKey]=plan[day][mealKey].filter(d=>d!==dish);
            changed++;
          }
        });
      });
    });
    return{plan,changed};
  }

  // 2. Swap specific day(s) + optional meal type
  if(daysMentioned.length){
    const mealsToChange=mealsMentioned.length?mealsMentioned:mealMap.filter(([m])=>m!=="tiffin");
    daysMentioned.forEach(day=>{
      mealsToChange.forEach(([mealKey,slot])=>{
        if(plan[day][mealKey])(Array.isArray(plan[day][mealKey])?plan[day][mealKey]:[]).forEach(d=>used.delete(d));
        plan[day][mealKey]=smartPick(slot,used,S.rules)||(mealKey==="tiffin"?null:[]);
        changed++;
      });
    });
    return{plan,changed};
  }

  // 3. Swap all of a meal type (e.g. "lighter dinners" → re-pick all dinners)
  if(mealsMentioned.length){
    mealsMentioned.forEach(([mealKey,slot])=>{
      DAYS.forEach(day=>{
        if(plan[day][mealKey])(Array.isArray(plan[day][mealKey])?plan[day][mealKey]:[]).forEach(d=>used.delete(d));
        plan[day][mealKey]=smartPick(slot,used,S.rules)||(mealKey==="tiffin"?null:[]);
        changed++;
      });
    });
    return{plan,changed};
  }

  return{plan:null,changed:0};
}

function buildShop(plan){
  const map={};
  DAYS.forEach(day=>{
    ["tiffin","lunch","dinner"].forEach(m=>{
      if(!plan[day][m])return;
      plan[day][m].forEach(dish=>{
        (ING[dish]||[["Ingredients for "+dish,1,"pcs","Other"]]).forEach(([name,qty,unit,cat])=>{
          const k=name+"||"+unit;
          if(map[k])map[k].qty=+(+map[k].qty+qty).toFixed(1);
          else map[k]={id:k,name,qty,unit,cat,have:false};
        });
      });
    });
  });
  return Object.values(map).sort((a,b)=>CATORD.indexOf(a.cat)-CATORD.indexOf(b.cat));
}

// ── FIREBASE REALTIME ──────────────────────────────────────────────────────
let fbStream=null,lastPushedAt=0;

function startRealtime(){
  if(fbStream){fbStream.close();fbStream=null;}
  const url=FIREBASE_URL+"/mealplanner/"+S.familyCode+".json";
  try{
    fbStream=new EventSource(url);
    fbStream.addEventListener("put",ev=>{
      try{
        const msg=JSON.parse(ev.data);
        const data=msg.data;
        if(!data){S.fbStatus="synced";updateFbDot();return;}
        const remoteTime=data.savedAt?+new Date(data.savedAt):0;
        const localTime=S.lastSaved?+new Date(S.lastSaved):0;
        // Don't overwrite if we just pushed (within 3 seconds)
        if(Date.now()-lastPushedAt<3000){S.fbStatus="synced";updateFbDot();return;}
        if(remoteTime>localTime){
          if(data.plan){S.plan=data.plan;S.ready=true;ss("mp-plan",data.plan);}
          if(data.rules){S.rules=data.rules;ss("mp-rules",data.rules);}
          if(data.shop){S.shop=data.shop;ss("mp-shop",data.shop);}
          if(data.custom){S.custom=data.custom;ss("mp-custom",data.custom);}
          S.lastSaved=data.savedAt;ss("mp-savedat",data.savedAt);
          S.fbStatus="synced";updateFbDot();
          render();showToast("Updated from other device ✓");
        }else{S.fbStatus="synced";updateFbDot();}
      }catch(e){console.error(e);}
    });
    fbStream.onerror=()=>{S.fbStatus="offline";updateFbDot();};
    fbStream.onopen=()=>{S.fbStatus="synced";updateFbDot();};
  }catch(e){S.fbStatus="offline";updateFbDot();}
}

async function fbPush(){
  try{
    lastPushedAt=Date.now();
    const data={plan:S.plan,rules:S.rules,shop:S.shop,custom:S.custom,savedAt:new Date().toISOString()};
    const r=await fetch(FIREBASE_URL+"/mealplanner/"+S.familyCode+".json",{
      method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)
    });
    if(r.ok){S.fbStatus="synced";updateFbDot();}
    else{S.fbStatus="error";updateFbDot();
      if(r.status===401||r.status===403)showToast("Add mealplanner to Firebase rules",true);}
  }catch(e){S.fbStatus="offline";updateFbDot();}
}

async function fbForcePull(){
  try{
    const r=await fetch(FIREBASE_URL+"/mealplanner/"+S.familyCode+".json");
    if(!r.ok){showToast("Pull failed: "+r.status+(r.status===403?" — check Firebase rules":""),true);return;}
    const data=await r.json();
    if(!data){showToast("Nothing saved under this code yet",true);return;}
    if(data.plan){S.plan=data.plan;S.ready=true;ss("mp-plan",data.plan);}
    if(data.rules){S.rules=data.rules;ss("mp-rules",data.rules);}
    if(data.shop){S.shop=data.shop;ss("mp-shop",data.shop);}
    if(data.custom){S.custom=data.custom;ss("mp-custom",data.custom);}
    S.lastSaved=data.savedAt;ss("mp-savedat",data.savedAt);
    S.fbStatus="synced";updateFbDot();
    render();showToast("Pulled successfully ✓");
  }catch(e){showToast("Pull error: "+e.message,true);console.error("Pull failed:",e);}
}

function updateFbDot(){
  const col=S.fbStatus==="synced"?"#059669":S.fbStatus==="error"?"#DC2626":"#D97706";
  document.querySelectorAll(".fb-dot").forEach(d=>d.style.background=col);
  const st=document.getElementById("fb-status-text");
  if(st)st.textContent="Firebase: "+(S.fbStatus==="synced"?"Live ✓":S.fbStatus==="offline"?"Offline":"Error — check rules");
}

function pushHistory(){
  const snap={plan:JSON.parse(JSON.stringify(S.plan)),shop:JSON.parse(JSON.stringify(S.shop)),rules:JSON.parse(JSON.stringify(S.rules)),custom:JSON.parse(JSON.stringify(S.custom))};
  S.history=[snap,...(S.history||[])].slice(0,5);
  ss("mp-history",S.history);
}
function undoLast(){
  if(!S.history||!S.history.length){showToast("Nothing to undo",true);return;}
  const prev=S.history[0];
  S.history=S.history.slice(1);
  ss("mp-history",S.history);
  S.plan=prev.plan;S.ready=true;S.shop=prev.shop;S.rules=prev.rules;S.custom=prev.custom;
  saveAll();render();showToast("Undone ✓");
}
function saveAll(){
  ss("mp-plan",S.plan);ss("mp-shop",S.shop);
  if(S.ready)try{recordPlanUsage(S.plan);}catch(e){}
  S.lastSaved=new Date().toISOString();ss("mp-savedat",S.lastSaved);
  fbPush();
}

function esc(s){return String(s===null||s===undefined?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function e(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>{

    return" "+k+'="'+String(v).replace(/"/g,"&quot;")+'"';
  }).join("");
  return"<"+tag+a+">"+(inner===undefined?"":inner)+"</"+tag+">";
}

document.addEventListener("click",ev=>{
  const el=ev.target.closest("[data-action]");if(!el)return;
  const a=el.dataset.action;
  const inModal=ev.target.closest("[data-stopclose]");
  if(a==="close-modal"&&!inModal){S.edit=null;S.syncModal=false;renderModals();return;}
  switch(a){
    case "undo-last": undoLast();break;
    case "set-tab": S.tab=el.dataset.tab;render();break;
    case "set-day": S.activeDay=el.dataset.day;render();break;
    case "generate":
      if(S.ready){S.showRegenConfirm=true;renderModals();}
      else{pushHistory();doGenerate();}
      break;
    case "do-regen":
      S.showRegenConfirm=false;pushHistory();doGenerate();break;
    case "cancel-regen":
      S.showRegenConfirm=false;renderModals();break;
    case "apply-fb":{
      if(!S.fb.trim())return;
      const{plan,changed}=applyFeedbackToPlan(S.fb);
      if(!plan){showToast("Be specific: e.g. 'swap Monday dinner' or 'no rajma'",true);return;}
      S.plan=plan;S.shop=buildShop(plan);saveAll();S.fb="";render();
      showToast(changed+" slot"+(changed>1?"s":"")+" updated ✓");break;}
    case "open-edit": S.edit={day:el.dataset.day,meal:el.dataset.meal};S.sel=[...(S.plan[el.dataset.day][el.dataset.meal]||[])];S.q="";renderModals();break;
    case "toggle-dish":{const d=el.dataset.dish;if(S.sel.includes(d))S.sel=S.sel.filter(x=>x!==d);else if(S.sel.length>=2)S.sel=[S.sel[1],d];else S.sel=[...S.sel,d];renderModals();break;}
    case "desel": S.sel=S.sel.filter(x=>x!==el.dataset.dish);renderModals();break;
    case "skip-meal": S.sel=[];renderModals();break;
    case "confirm-edit":{
      const{day,meal}=S.edit;
      S.plan={...S.plan,[day]:{...S.plan[day],[meal]:S.sel.length?[...S.sel]:null}};
      S.shop=buildShop(S.plan);saveAll();S.edit=null;render();showToast("Updated!");break;}
    case "toggle-have":{S.shop=S.shop.map(it=>it.id===el.dataset.id?{...it,have:!it.have}:it);saveAll();render();break;}
    case "delete-item":{S.shop=S.shop.filter(it=>it.id!==el.dataset.id);saveAll();render();break;}
    case "update-shop":{
      S.confirmUpdateShop=true;renderModals();break;}
    case "do-update-shop":{
      pushHistory();S.shop=buildShop(S.plan);saveAll();
      S.confirmUpdateShop=false;render();showToast("Shopping list rebuilt from meal plan");break;}
    case "cancel-update-shop":{
      S.confirmUpdateShop=false;renderModals();break;}
    case "refresh-prices":{
      if(S.pricesLoading)break;
      // async IIFE
      if(!S.shop||!S.shop.length){showToast("Generate a plan first",true);break;}
      S.pricesLoading=true;render();
      const names=[...new Set(S.shop.map(it=>it.name))].slice(0,25);
      (async()=>{
      // Fetch prices directly via CORS proxy → Talabat UAE
      const results={};
      const fetchOne=async(item)=>{
        try{
          const q=encodeURIComponent(item);
          const url="https://corsproxy.io/?"+encodeURIComponent("https://api.talabat.com/v2/delivery/grocery/products/search?q="+q+"&vendorId=379&pageSize=3");
          const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
          if(!r.ok)return null;
          const data=await r.json();
          const products=data?.products||data?.items||data?.data||[];
          const match=products[0];
          const price=match?.price?.amount||match?.price||match?.unitPrice;
          return price?parseFloat(price):null;
        }catch{return null;}
      };
      let found=0;
      for(let i=0;i<names.length;i+=3){
        const batch=names.slice(i,i+3);
        const prices=await Promise.all(batch.map(fetchOne));
        batch.forEach((nm,idx)=>{if(prices[idx]!==null){results[nm.toLowerCase()]=Math.round(prices[idx]*10)/10;found++;}});
      }
      if(found>0){
        S.livePrices=results;S.pricesUpdated=new Date().toISOString();
        ss("mp-liveprices",S.livePrices);ss("mp-pricesdate",S.pricesUpdated);
        showToast(found+" prices updated from Talabat ✓");
      }else{showToast("Talabat unavailable — using estimates",true);}
      S.pricesLoading=false;render();
      })();
      break;}
    case "add-item":{
      if(!S.niName.trim())return;
      S.shop=[...S.shop,{id:"c"+Date.now(),name:S.niName.trim(),qty:S.niQty||1,unit:S.niUnit,cat:"Other",have:false}];
      saveAll();S.niName="";S.niQty="";render();showToast("Added!");break;}
    case "add-rule":{
      if(!S.newRule.trim())return;
      S.rules=[...S.rules,{id:Date.now(),text:S.newRule.trim()}];
      ss("mp-rules",S.rules);fbPush();S.newRule="";render();showToast("Rule saved!");break;}
    case "delete-rule":{S.rules=S.rules.filter(r=>String(r.id)!==el.dataset.id);ss("mp-rules",S.rules);fbPush();render();break;}
    case "open-sync": S.syncModal=true;renderModals();break;
    case "toggle-sync-pause":
      S.syncPaused=!S.syncPaused;ss("mp-sync-paused",S.syncPaused);
      if(S.syncPaused){if(fbStream){fbStream.close();fbStream=null;}S.fbStatus="paused";}
      else{startRealtime();}
      updateFbDot();renderModals();
      showToast(S.syncPaused?"Sync paused — changes stay local":"Sync resumed ✓");
      break;
    case "copy-fcode":
      navigator.clipboard?.writeText(S.familyCode).then(()=>showToast("Code copied!")).catch(()=>showToast(S.familyCode,true));break;
    case "refresh-code":{
      const nc=genCode();S.familyCode=nc;ss("mp-fcode",nc);
      if(fbStream){fbStream.close();fbStream=null;}
      S.fbStatus="connecting";renderModals();
      showToast("New code: "+nc);startRealtime();break;}
    case "force-push":
      S.syncModal=false;renderModals();showToast("Pushing...");
      fbPush().then?fbPush().then(()=>showToast("Pushed ✓")):fbPush();
      (async()=>{await fbPush();showToast("Pushed to Firebase ✓");})();break;
    case "force-pull":
      S.syncModal=false;renderModals();fbForcePull();break;
    case "join-family":{
      const inp=document.getElementById("join-code");
      const code=(inp?.value||"").trim().toUpperCase();
      if(code.length<4){showToast("Enter a valid code",true);return;}
      S.familyCode=code;ss("mp-fcode",code);
      if(fbStream){fbStream.close();fbStream=null;}
      S.syncModal=false;renderModals();
      showToast("Connecting to code: "+code+"...");
      startRealtime();
      setTimeout(()=>fbForcePull(),500);break;}
    case "nd-slot":{const sl=el.dataset.slot;S.newDishSlots={...S.newDishSlots,[sl]:!S.newDishSlots[sl]};render();break;}
    case "add-dish":{
      if(!S.newDishName.trim())return;
      const slots=Object.keys(S.newDishSlots).filter(k=>S.newDishSlots[k]);
      if(!slots.length){showToast("Select at least one meal slot",true);return;}
      S.custom={...S.custom,[S.newDishName.trim()]:{slots,dtype:S.newDishType}};
      ss("mp-custom",S.custom);fbPush();S.newDishName="";S.newDishSlots={T:false,L:false,D:false};S.newDishType="sabzi";render();showToast("Dish added!");break;}
    case "delete-dish":{const d=el.dataset.dish;delete S.custom[d];ss("mp-custom",S.custom);fbPush();render();break;}
    case "toggle-slot":{
      const dish=el.dataset.dish,slot=el.dataset.slot;
      if(!S.custom[dish])S.custom[dish]={slots:[...(CATS[dish]||[])],dtype:DTYPE[dish]||"sabzi"};
      const slots=S.custom[dish].slots;
      S.custom[dish].slots=slots.includes(slot)?slots.filter(s=>s!==slot):[...slots,slot];
      if(!S.custom[dish].slots.length)delete S.custom[dish];
      ss("mp-custom",S.custom);fbPush();render();break;}
  }
});

        const pool=meal==="tiffin"?Object.keys(all).filter(d=>all[d].dtype!=="dessert"&&all[d].dtype!=="condiment"):meal==="lunch"?Object.keys(all).filter(d=>all[d].slots.includes("L")):Object.keys(all).filter(d=>all[d].slots.includes("D"));
        const filt=pool.filter(d=>d.toLowerCase().includes(S.q.toLowerCase())).sort();
        const listEl=document.getElementById("edit-dish-list");
        if(listEl)listEl.innerHTML=filt.map(d=>e("span",{class:"dish-chip"+(S.sel.includes(d)?" sel":""),"data-action":"toggle-dish","data-dish":esc(d)},esc(d))).join("");
      }break;}
    case "fb-area": S.fb=ev.target.value;break;
    case "new-rule": S.newRule=ev.target.value;render();break;
    case "ni-name": S.niName=ev.target.value;break;
    case "ni-qty": S.niQty=ev.target.value;break;
    case "update-qty":{S.shop=S.shop.map(it=>it.id===ev.target.dataset.id?{...it,qty:ev.target.value}:it);saveAll(false);break;}
    case "nd-name": S.newDishName=ev.target.value;render();break;
    case "settings-search":{
      S.settingsSearch=ev.target.value;
      const listEl=document.getElementById("settings-dish-list");
      if(listEl)listEl.innerHTML=renderDishRows(S.settingsSearch);break;}
  }
});
document.addEventListener("change",ev=>{
  if(ev.target.dataset.action==="ni-unit")S.niUnit=ev.target.value;
  if(ev.target.dataset.action==="nd-type")S.newDishType=ev.target.value;
  if(ev.target.dataset.action==="update-unit"){
    S.shop=S.shop.map(it=>it.id===ev.target.dataset.id?{...it,unit:ev.target.value}:it);
    saveAll(false);
  }
});

// ── INIT ────────────────────────────────────────────────────────────────────
// Clear incompatible old data (breakfast→tiffin migration)
try{
  const old=ls("mp-plan");
  if(old&&old.mon&&old.mon.breakfast!==undefined){
    localStorage.removeItem("mp-plan");
    localStorage.removeItem("mp-shop");
    localStorage.removeItem("mp-history");
    S.plan=mkEmpty();S.ready=false;S.shop=[];S.history=[];
  }
}catch(e){}
// Auto-pull from Firebase on first load if no local data
if(!S.ready){
  setTimeout(()=>{
    fbForcePull().then(()=>{}).catch(()=>{});
  },2000);
}

// Safe render with error display
try{
  render();
}catch(err){
  document.getElementById("app").innerHTML='<div style="padding:40px 20px;text-align:center"><p style="color:#EF4444;font-weight:700;margin-bottom:12px">App error — clearing old data...</p><p style="font-size:12px;color:#64748B">'+err.message+'</p></div>';
  // Clear all data and retry
  ["mp-plan","mp-shop","mp-rules","mp-custom","mp-history","mp-liveprices"].forEach(k=>localStorage.removeItem(k));
  S.plan=mkEmpty();S.ready=false;S.shop=[];S.rules=[];S.custom={};S.history=[];
  setTimeout(()=>render(),1000);
}
startRealtime();
</script>
</body>
</html>
