<title>Family Meal Planner</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;background:#F0F4FF;color:#1E293B;font-family:'Nunito',sans-serif}
input,textarea,select{font-family:'Nunito',sans-serif;outline:none;color:#1E293B}
select option{background:#fff}
::-webkit-scrollbar{display:none}
.card{background:#fff;border:1px solid rgba(59,130,246,.15);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(59,130,246,.06)}
.meal-row{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.05)}
.meal-row:last-child{border-bottom:none}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.btn-blue{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-outline{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.3)!important;color:#3B82F6}
.btn-green{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.3)!important;color:#16A34A}
.btn-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3)!important;color:#EF4444}
.inp{background:#F8FAFF;border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:9px 12px;font-size:13px;width:100%}
.ta{width:100%;background:#F8FAFF;border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 12px;color:#1E293B;font-size:13px;font-family:'Nunito',sans-serif;resize:none;line-height:1.5}
.lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#94A3B8;font-weight:700;margin-bottom:6px;display:block}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(59,130,246,.12);display:flex;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nb{flex:1;padding:10px 0;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.ni{font-size:18px}
.nl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Nunito',sans-serif;color:#94A3B8}
.nb.act .nl{color:#3B82F6}
.nd{width:18px;height:2px;background:#3B82F6;border-radius:1px;display:none}
.nb.act .nd{display:block}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,.12)}
.mh{width:36px;height:4px;background:rgba(59,130,246,.2);border-radius:2px;margin:12px auto 0}
.chip{display:inline-block;padding:6px 11px;border-radius:20px;background:#EEF2FF;border:1px solid rgba(59,130,246,.15);color:#1E293B;font-size:12px;cursor:pointer;margin:3px}
.chip.sel{background:#3B82F6;border-color:#3B82F6;color:#fff;font-weight:700}
.shop-row{display:flex;align-items:center;gap:7px;padding:8px 10px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:10px;margin-bottom:5px}
.chk{width:20px;height:20px;min-width:20px;border-radius:6px;border:1.5px solid rgba(59,130,246,.3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on{background:#16A34A;border-color:#16A34A;color:#fff;font-size:11px}
.rule-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#F8FAFF;border:1px solid rgba(59,130,246,.12);border-radius:12px;margin-bottom:8px}
.sd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.05)}
.pill{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid;font-family:'Nunito',sans-serif}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:200;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;pointer-events:none}
.cov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.cbox{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px}
</style>
</head>

function e(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>{
    if(v===null||v===undefined||v===false)return '';
    if(v===true)return ' '+k;
    return ' '+k+'="'+String(v).replace(/"/g,"&quot;")+'"';
  }).join('');
  return '<'+tag+a+'>'+( inner===undefined?'':inner)+'</'+tag+'>';
}

// ─── PATTERN LEARNING ─────────────────────────────────────────────────────────
function getDishW(dish){
  const f=(ls("mp-freq")||{})[dish]||0;
  const d=(ls("mp-drop")||{})[dish]||0;
  return Math.max(0.2,1+(f*0.25)-(d*0.4));
}
function wPick(arr){
  if(!arr||!arr.length)return null;
  const w=arr.map(d=>getDishW(d));
  const t=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*t;
  for(let i=0;i<arr.length;i++){r-=w[i];if(r<=0)return arr[i];}
  return arr[arr.length-1];
}
function recordUsage(plan){
  const f={...(ls("mp-freq")||{})};
  DAYS.forEach(d=>{const p=plan[d];if(!p)return;["tiffin","lunch","dinner"].forEach(m=>{const ds=p[m];if(ds)ds.forEach(x=>{f[x]=(f[x]||0)+1;});});});
  ss("mp-freq",f);
}
function recordDrop(dish){
  if(!dish)return;
  const d={...(ls("mp-drop")||{})};d[dish]=(d[dish]||0)+1;ss("mp-drop",d);
}

function toKg(q,u){if(u==="g")return q/1000;if(u==="tbsp")return q*0.015;if(u==="tsp")return q*0.005;return q;}
function toL(q,u){if(u==="ml")return q/1000;if(u==="tbsp")return q*0.015;return q;}
function getPrice(item){
  const lp=(ls("mp-lp")||{})[item.name.toLowerCase()];
  if(lp!=null)return lp;
  const nm=item.name.toLowerCase();
  let entry=null;
  for(const [k,v] of Object.entries(PRICES)){if(nm===k||nm.includes(k)||(k.split(" ")[0].length>3&&nm.includes(k.split(" ")[0]))){entry=v;break;}}
  if(!entry)return 5;
  const [p,u]=entry;const q=+item.qty||1;
  let conv=u==="kg"?toKg(q,item.unit):u==="L"?toL(q,item.unit):q;
  return Math.max(0.5,Math.round(p*conv*10)/10);
}

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
let fbSrc=null,fbPollT=null,fbLastPush=0;

function fbDot(){
  const col=S.fbStatus==="synced"?"#16A34A":S.fbStatus==="paused"?"#94A3B8":S.fbStatus==="offline"?"#F59E0B":"#EF4444";
  document.querySelectorAll(".fbdot").forEach(d=>{d.style.background=col;});
}

function startSync(){
  if(S.syncPaused){S.fbStatus="paused";fbDot();return;}
  if(fbSrc){fbSrc.close();fbSrc=null;}
  if(fbPollT){clearInterval(fbPollT);fbPollT=null;}
  try{
    fbSrc=new EventSource(FB_URL+"/mealplanner/"+S.fcode+".json");
    fbSrc.addEventListener("put",ev=>{
      try{
        const msg=JSON.parse(ev.data);const data=msg.data;
        if(!data){S.fbStatus="synced";fbDot();return;}
        if(Date.now()-fbLastPush<3000){S.fbStatus="synced";fbDot();return;}
        const rT=data.savedAt?+new Date(data.savedAt):0;
        const lT=S.lastSaved?+new Date(S.lastSaved):0;
        if(rT>lT){
          if(data.plan){const p=migratePlan(data.plan);S.plan=p;S.ready=true;ss("mp-plan",p);}
          if(data.rules){S.rules=data.rules;ss("mp-rules",data.rules);}
          if(data.shop){S.shop=data.shop;ss("mp-shop",data.shop);}
          if(data.custom){S.custom=data.custom;ss("mp-custom",data.custom);}
          S.lastSaved=data.savedAt;ss("mp-saved",data.savedAt);
          S.fbStatus="synced";fbDot();render();toast("Synced from other device ✓");
        }else{S.fbStatus="synced";fbDot();}
      }catch(err){console.error(err);}
    });
    fbSrc.onerror=()=>{S.fbStatus="offline";fbDot();};
    fbSrc.onopen=()=>{S.fbStatus="synced";fbDot();};
  }catch{fbPollT=setInterval(fbPull,60000);fbPull();}
}

async function fbPush(){
  if(S.syncPaused)return;
  try{
    fbLastPush=Date.now();
    const data={plan:S.plan,rules:S.rules,shop:S.shop,custom:S.custom,savedAt:new Date().toISOString()};
    const r=await fetch(FB_URL+"/mealplanner/"+S.fcode+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    S.fbStatus=r.ok?"synced":"error";fbDot();
    if(!r.ok&&(r.status===401||r.status===403))toast("Add mealplanner to Firebase rules",1);
  }catch{S.fbStatus="offline";fbDot();}
}

function validPlan(plan){
  if(!plan||typeof plan!=="object")return false;
  return DAYS.every(d=>plan[d]&&typeof plan[d]==="object"&&"tiffin" in plan[d]&&"lunch" in plan[d]&&"dinner" in plan[d]);
}
function migratePlan(plan){
  // Fix old plans that had "breakfast" instead of "tiffin"
  if(!plan)return mkEmpty();
  const fixed={};
  DAYS.forEach(d=>{
    const day=plan[d]||{};
    fixed[d]={
      tiffin:day.tiffin!==undefined?day.tiffin:(day.breakfast||null),
      lunch:day.lunch||[],
      dinner:day.dinner||[]
    };
  });
  return fixed;
}
async function fbPull(force=false){
  if(S.syncPaused&&!force){toast("Sync is paused",1);return;}
  try{
    const r=await fetch(FB_URL+"/mealplanner/"+S.fcode+".json");
    if(!r.ok){toast("Pull failed: "+(r.status===403?"check Firebase rules":r.status),1);return;}
    const data=await r.json();
    if(!data){toast("No data found for this code",1);return;}
    const rT=data.savedAt?+new Date(data.savedAt):0;
    const lT=S.lastSaved?+new Date(S.lastSaved):0;
    if(force||rT>lT){
      if(data.plan){const p=migratePlan(data.plan);S.plan=p;S.ready=true;ss("mp-plan",p);}
      if(data.rules){S.rules=data.rules;ss("mp-rules",data.rules);}
      if(data.shop){S.shop=data.shop;ss("mp-shop",data.shop);}
      if(data.custom){S.custom=data.custom;ss("mp-custom",data.custom);}
      S.lastSaved=data.savedAt;ss("mp-saved",data.savedAt);
      S.fbStatus="synced";fbDot();render();toast("Plan pulled ✓");
    }else{toast("Already up to date");S.fbStatus="synced";fbDot();}
  }catch(err){toast("Pull error: "+err.message,1);}
}

// ─── SMART PAIRING ────────────────────────────────────────────────────────────
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function getAllDishes(){
  const all={};
  Object.entries(CATS).forEach(([d,sl])=>{all[d]={slots:sl,dtype:DTYPE[d]||"sabzi"};});
  Object.entries(S.custom).forEach(([d,v])=>{all[d]={slots:v.slots,dtype:v.dtype||"sabzi"};});
  return all;
}

function matchesRules(dish,slot){
  const t=dish.toLowerCase();
  for(const r of S.rules){
    const rt=r.text.toLowerCase();
    const sn=slot==="T"?"tiffin":slot==="L"?"lunch":"dinner";
    if(/^(no|never)\s+/.test(rt)&&t.includes(rt.replace(/^(no|never)\s+/,"")))return false;
    const m1=rt.match(/(.+?)\s+only\s+(?:at|for)\s+(tiffin|lunch|dinner)/);
    if(m1&&t.includes(m1[1].trim())&&m1[2]!==sn)return false;
    const m2=rt.match(/(.+?)\s+never\s+(?:at|for|in)\s+(tiffin|lunch|dinner)/);
    if(m2&&t.includes(m2[1].trim())&&m2[2]===sn)return false;
  }
  return true;
}

function smartPick(slot,used){
  const all=getAllDishes();
  const avail=Object.keys(all).filter(d=>{
    const dt=all[d].dtype;
    if(dt==="dessert"||dt==="condiment")return false;
    if(slot==="T"&&!all[d].slots.includes("T"))return false;
    if(slot==="L"&&!all[d].slots.includes("L"))return false;
    if(slot==="D"&&!all[d].slots.includes("D"))return false;
    if(used.has(d))return false;
    return matchesRules(d,slot);
  });
  if(!avail.length)return null;
  const byT=t=>avail.filter(d=>all[d].dtype===t);
  const dal=byT("dal"),sabzi=byT("sabzi"),gravy=byT("gravy");
  const standalone=byT("standalone"),paratha=byT("paratha"),rice=byT("rice");
  if(slot==="T"){
    const tp=[...paratha,...byT("tiffin"),...byT("snack")].filter(d=>avail.includes(d));
    const d=wPick(tp.length?tp:avail);if(d)used.add(d);return d?[d]:null;
  }
  const pats=[];
  if(dal.length&&rice.length)for(let i=0;i<25;i++)pats.push("dr");
  if(sabzi.length&&dal.length)for(let i=0;i<20;i++)pats.push("sd");
  if(standalone.length)for(let i=0;i<18;i++)pats.push("st");
  if(paratha.length)for(let i=0;i<15;i++)pats.push("pa");
  if(gravy.length&&rice.length)for(let i=0;i<10;i++)pats.push("gr");
  if(sabzi.length)for(let i=0;i<7;i++)pats.push("sb");
  if(gravy.length)for(let i=0;i<5;i++)pats.push("gv");
  if(!pats.length){const d=wPick(avail);if(d)used.add(d);return d?[d]:null;}
  const pat=pats[Math.floor(Math.random()*pats.length)];
  let res=[];
  if(pat==="dr"){const d=wPick(dal),r=wPick(rice.filter(x=>!used.has(x)));if(d&&r){res=[d,r];}else if(d)res=[d];}
  else if(pat==="sd"){const s=wPick(sabzi),d=wPick(dal.filter(x=>x!==s&&!used.has(x)));if(s&&d){res=[s,d];}else if(s)res=[s];}
  else if(pat==="st"){const d=wPick(standalone);if(d)res=[d];}
  else if(pat==="pa"){const d=wPick(paratha);if(d)res=[d];}
  else if(pat==="gr"){const g=wPick(gravy),r=wPick(rice.filter(x=>!used.has(x)));if(g&&r){res=[g,r];}else if(g)res=[g];}
  else if(pat==="sb"){const d=wPick(sabzi);if(d)res=[d];}
  else if(pat==="gv"){const d=wPick(gravy);if(d)res=[d];}
  res.forEach(d=>used.add(d));return res.length?res:null;
}

function generatePlan(){
  const used=new Set();
  const tDays=new Set(shuf([...DAYS]).slice(0,4));
  return DAYS.reduce((p,d)=>({...p,[d]:{
    tiffin:tDays.has(d)?smartPick("T",used):null,
    lunch:smartPick("L",used)||[],
    dinner:smartPick("D",used)||[]
  }}),{});
}

// ─── SHOPPING ─────────────────────────────────────────────────────────────────
function buildShop(plan){
  const map={};
  DAYS.forEach(d=>{
    const p=plan[d];
    [p.tiffin,p.lunch,p.dinner].forEach(dishes=>{
      if(!dishes)return;
      dishes.forEach(dish=>{
        (ING[dish]||[["Items for "+dish,1,"pcs","Other"]]).forEach(([n,q,u,c])=>{
          const k=n+"||"+u;
          if(map[k])map[k].qty=+(+map[k].qty+q).toFixed(1);
          else map[k]={id:k,name:n,qty:q,unit:u,cat:c,have:false};
        });
      });
    });
  });
  return Object.values(map).sort((a,b)=>CATORD.indexOf(a.cat)-CATORD.indexOf(b.cat));
}

// ─── FEEDBACK PARSER ──────────────────────────────────────────────────────────
function applyFeedback(txt){
  if(!txt.trim())return;
  const t=txt.toLowerCase();
  const all=getAllDishes();
  const dayMap={monday:"mon",tuesday:"tue",wednesday:"wed",thursday:"thu",friday:"fri",saturday:"sat",mon:"mon",tue:"tue",wed:"wed",thu:"thu",fri:"fri",sat:"sat"};
  const mealMap={tiffin:"tiffin",lunch:"lunch",dinner:"dinner"};
  let fDay=null,fMeal=null;
  Object.entries(dayMap).forEach(([n,k])=>{if(t.includes(n))fDay=k;});
  Object.entries(mealMap).forEach(([n,k])=>{if(t.includes(n))fMeal=k;});
  let toRemove=null;
  Object.keys(all).forEach(dish=>{
    const dl=dish.toLowerCase();
    if(t.includes(dl)){
      const idx=t.indexOf(dl);
      const before=t.substring(Math.max(0,idx-20),idx);
      if(/no|not|remove|don.t|dont|without|avoid|skip|swap/.test(before))toRemove=dish;
    }
  });
  if(toRemove){
    const used=new Set();
    DAYS.forEach(d=>{["tiffin","lunch","dinner"].forEach(m=>{const ds=S.plan[d][m];if(ds)ds.forEach(x=>{if(x!==toRemove)used.add(x);});});});
    let changed=false;
    DAYS.forEach(d=>{
      ["tiffin","lunch","dinner"].forEach(m=>{
        const ds=S.plan[d][m];
        if(ds&&ds.includes(toRemove)){
          const sl=m==="tiffin"?"T":m==="lunch"?"L":"D";
          const others=ds.filter(x=>x!==toRemove);
          const rep=smartPick(sl,new Set([...used,toRemove]));
          if(rep&&rep[0]){used.add(rep[0]);S.plan[d][m]=[...others,rep[0]];}
          else S.plan[d][m]=others.length?others:null;
          changed=true;
        }
      });
    });
    if(changed){S.shop=buildShop(S.plan);saveAll();render();toast("Removed "+toRemove+" and replaced it");}
    else toast(toRemove+" wasn't in this week's plan",1);
    return;
  }
  if(fDay){
    const used=new Set();
    DAYS.forEach(d=>{
      ["tiffin","lunch","dinner"].forEach(m=>{
        if(d===fDay&&(!fMeal||m===fMeal))return;
        const ds=S.plan[d][m];if(ds)ds.forEach(x=>used.add(x));
      });
    });
    if(fMeal){
      const sl=fMeal==="tiffin"?"T":fMeal==="lunch"?"L":"D";
      S.plan={...S.plan,[fDay]:{...S.plan[fDay],[fMeal]:smartPick(sl,used)}};
      toast("Changed "+DL[fDay]+" "+fMeal);
    }else{
      S.plan={...S.plan,[fDay]:{tiffin:smartPick("T",used),lunch:smartPick("L",used)||[],dinner:smartPick("D",used)||[]}};
      toast("Changed all of "+DL[fDay]);
    }
    S.shop=buildShop(S.plan);saveAll();render();return;
  }
  toast('Say "swap Monday lunch" or "no rajma"',1);
}

let toastT;
function toast(msg,err){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=err?"#EF4444":"#16A34A";
  t.style.color="#fff";t.style.display="block";t.style.opacity="1";
  clearTimeout(toastT);toastT=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.style.display="none",300);},3000);
}

        ["T","L","D"].map(sl=>e("button",{class:"pill","data-a":"tog-slot","data-dish":esc(d),"data-slot":sl,style:"border-color:"+(slots.includes(sl)?SC[sl]:"rgba(0,0,0,.1)")+";color:"+(slots.includes(sl)?SC[sl]:"#CBD5E1")+";background:"+(slots.includes(sl)?SC[sl]+"15":"transparent")},SL[sl])).join("")+
        (isC?e("button",{"data-a":"del-dish","data-dish":esc(d),style:"background:transparent;border:none;color:#CBD5E1;font-size:14px;cursor:pointer;margin-left:3px"},"×"):"")
      )
    );
  }).join("");
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────

        e("div",{style:"font-size:11px;color:#94A3B8;margin-top:2px"},S.selDishes.length+"/2 selected")
      )+

        e("span",{"data-a":"clear-slot",style:"display:inline-block;margin-top:6px;padding:5px 12px;border-radius:20px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25);color:#EF4444;font-size:12px;font-weight:700;cursor:pointer"},meal==="tiffin"?"✕ No tiffin today":"✕ Clear slot")
      )+
      e("div",{id:"dish-chips",style:"overflow-y:auto;flex:1;padding:4px 16px 10px;display:flex;flex-wrap:wrap;align-content:flex-start"},
        filt.map(d=>e("span",{class:"chip"+(S.selDishes.includes(d)?" sel":""),"data-a":"tog-dish","data-dish":esc(d)},esc(d))).join("")
      )+
      e("div",{style:"padding:10px 16px 28px;border-top:1px solid rgba(59,130,246,.08)"},
        e("button",{class:"btn btn-blue","data-a":"confirm-edit"},"Confirm")
      )
    )
  );
}

      )+

        e("button",{"data-a":"new-code",style:"flex:1;padding:10px;background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.1);border-radius:10px;color:#64748B;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer"},"New Code")

      )+
      e("button",{"data-a":"toggle-pause",style:"width:100%;padding:10px;background:"+(S.syncPaused?"rgba(239,68,68,.08)":"rgba(59,130,246,.06)")+";border:1px solid "+(S.syncPaused?"rgba(239,68,68,.3)":"rgba(59,130,246,.2)")+";border-radius:10px;color:"+(S.syncPaused?"#EF4444":"#3B82F6")+";font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:14px"},S.syncPaused?"▶ Resume Sync":"⏸ Pause Sync")+
      e("div",{style:"display:flex;gap:8px;margin-bottom:14px"},
        e("button",{"data-a":"push",style:"flex:1;padding:10px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:10px;color:#F97316;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer"},"Push My Plan")+
        e("button",{"data-a":"pull",style:"flex:1;padding:10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:10px;color:#3B82F6;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer"},"Pull Other Plan")
      )+
      e("div",{style:"height:1px;background:rgba(0,0,0,.07);margin-bottom:14px"})+
      e("span",{class:"lbl"},"JOIN ANOTHER DEVICE'S CODE")+

      e("button",{"data-a":"join-code",style:"width:100%;padding:13px;background:linear-gradient(135deg,#3B82F6,#2563EB);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer"},"Use This Code + Pull Plan")

window.doTestFb=async function(btn){
  btn.textContent="...";btn.disabled=true;
  try{
    const r=await fetch(FB_URL+"/mealplanner/"+S.fcode+".json");
    if(r.status===200){
      const data=await r.json();
      btn.textContent="✓ OK";btn.style.color="#16A34A";
      toast("Firebase OK: "+(data?"data found":"empty"));
    }else{
      btn.textContent="✗ "+r.status;btn.style.color="#EF4444";
      toast(r.status===403?"Add mealplanner to Firebase rules":"HTTP error "+r.status,1);
    }
  }catch(err){btn.textContent="✗ Offline";btn.style.color="#EF4444";toast("Can't reach Firebase",1);}
  setTimeout(()=>{btn.textContent="Test";btn.disabled=false;btn.style.color="";},3000);
};

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.addEventListener("click",ev=>{
  const el=ev.target.closest("[data-a]");
  if(!el)return;
  const a=el.dataset.a;
  if(a==="close-modal"&&!ev.target.closest(".modal")){S.editSlot=null;S.syncOpen=false;S.regenConfirm=false;S.shopConfirm=false;renderM();return;}
  switch(a){
    case "tab":{S.tab=el.dataset.tab;render();break;}
    case "day":{S.day=el.dataset.day;render();break;}
    case "ask-regen":{if(!S.ready){pushHist();S.plan=generatePlan();S.ready=true;S.shop=buildShop(S.plan);saveAll();render();toast("Week plan ready!");}else{S.regenConfirm=true;renderM();}break;}
    case "do-regen":{S.regenConfirm=false;pushHist();S.plan=generatePlan();S.ready=true;S.shop=buildShop(S.plan);saveAll();render();toast("New plan generated!");break;}
    case "cancel-regen":{S.regenConfirm=false;renderM();break;}
    case "apply-fb":{applyFeedback(S.fb);break;}
    case "undo":{undoLast();break;}
    case "open-sync":{S.syncOpen=true;renderM();break;}
    case "close-modal":{S.syncOpen=false;renderM();break;}
    case "edit-slot":{S.editSlot={day:el.dataset.day,meal:el.dataset.meal};S.selDishes=[...(S.plan[el.dataset.day][el.dataset.meal]||[])];S.srchQ="";renderM();break;}
    case "tog-dish":{const d=el.dataset.dish;if(S.selDishes.includes(d))S.selDishes=S.selDishes.filter(x=>x!==d);else if(S.selDishes.length>=2)S.selDishes=[S.selDishes[1],d];else S.selDishes=[...S.selDishes,d];renderM();break;}
    case "desel":{S.selDishes=S.selDishes.filter(x=>x!==el.dataset.dish);renderM();break;}
    case "clear-slot":{S.selDishes=[];renderM();break;}
    case "confirm-edit":{
      const {day,meal}=S.editSlot;
      const old=S.plan[day][meal]||[];
      old.forEach(d=>{if(!S.selDishes.includes(d))recordDrop(d);});
      pushHist();
      S.plan={...S.plan,[day]:{...S.plan[day],[meal]:S.selDishes.length?[...S.selDishes]:null}};
      S.shop=buildShop(S.plan);saveAll();S.editSlot=null;render();toast("Updated!");break;
    }
    case "have":{S.shop=S.shop.map(it=>it.id===el.dataset.id?{...it,have:!it.have}:it);saveAll();render();break;}
    case "del-item":{S.shop=S.shop.filter(it=>it.id!==el.dataset.id);saveAll();render();break;}
    case "add-item":{
      if(!S.niName.trim())return;
      S.shop=[...S.shop,{id:"c"+Date.now(),name:S.niName.trim(),qty:S.niQty||1,unit:S.niUnit,cat:"Other",have:false}];
      saveAll();S.niName="";S.niQty="";render();toast("Added!");break;
    }
    case "ask-update-shop":{S.shopConfirm=true;renderM();break;}
    case "do-update-shop":{pushHist();S.shop=buildShop(S.plan);saveAll();S.shopConfirm=false;render();toast("Shopping list rebuilt!");break;}
    case "cancel-update-shop":{S.shopConfirm=false;renderM();break;}
    case "refresh-prices":{
      if(S.pricesLoading||!S.shop.length)return;
      S.pricesLoading=true;render();
      const names=[...new Set(S.shop.map(it=>it.name))].slice(0,25);
      (async()=>{
        const res={};let found=0;
        for(let i=0;i<names.length;i+=3){
          const batch=names.slice(i,i+3);
          const prices=await Promise.all(batch.map(async nm=>{
            try{
              const q=encodeURIComponent(nm);
              // Try multiple proxies
              const proxies=[
                "https://api.allorigins.win/raw?url=",
                "https://corsproxy.io/?"
              ];
              for(const proxy of proxies){
                try{
                  const url=proxy+encodeURIComponent("https://api.talabat.com/v2/delivery/grocery/products/search?q="+q+"&vendorId=379&pageSize=3");
                  const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
                  if(!r.ok)continue;
                  const data=await r.json();
                  const products=data?.products||data?.items||data?.data||[];
                  const match=products[0];
                  const price=match?.price?.amount||match?.price||match?.unitPrice;
                  if(price)return parseFloat(price);
                }catch{}
              }
              return null;
            }catch{return null;}
          }));
          batch.forEach((nm,idx)=>{if(prices[idx]!=null){res[nm.toLowerCase()]=Math.round(prices[idx]*10)/10;found++;}});
        }
        if(found>0){S.livePrices=res;S.pricesAt=new Date().toISOString();ss("mp-lp",S.livePrices);ss("mp-lpat",S.pricesAt);toast(found+" prices from Talabat ✓");}
        else toast("Talabat unavailable — using estimates",1);
        S.pricesLoading=false;render();
      })();
      break;
    }
    case "add-rule":{if(!S.newRule.trim())return;S.rules=[...S.rules,{id:Date.now(),text:S.newRule.trim()}];ss("mp-rules",S.rules);fbPush();S.newRule="";render();toast("Rule saved!");break;}
    case "del-rule":{S.rules=S.rules.filter(r=>String(r.id)!==el.dataset.id);ss("mp-rules",S.rules);fbPush();render();break;}
    case "nd-slot":{const sl=el.dataset.slot;S.ndSlots={...S.ndSlots,[sl]:!S.ndSlots[sl]};render();break;}
    case "add-dish":{
      if(!S.ndName.trim())return;
      const slots=Object.keys(S.ndSlots).filter(k=>S.ndSlots[k]);
      if(!slots.length){toast("Select at least one slot",1);return;}
      S.custom={...S.custom,[S.ndName.trim()]:{slots,dtype:S.ndType}};
      ss("mp-custom",S.custom);fbPush();S.ndName="";S.ndSlots={T:false,L:false,D:false};S.ndType="sabzi";render();toast("Dish added!");break;
    }
    case "del-dish":{const d=el.dataset.dish;delete S.custom[d];ss("mp-custom",S.custom);fbPush();render();break;}
    case "tog-slot":{
      const dish=el.dataset.dish;const slot=el.dataset.slot;
      if(!S.custom[dish]){S.custom[dish]={slots:[...CATS[dish]||[]],dtype:DTYPE[dish]||"sabzi"};}
      const sl=S.custom[dish].slots;
      S.custom[dish].slots=sl.includes(slot)?sl.filter(s=>s!==slot):[...sl,slot];
      if(!S.custom[dish].slots.length)delete S.custom[dish];
      ss("mp-custom",S.custom);fbPush();render();break;
    }
    case "copy-code":{navigator.clipboard?.writeText(S.fcode).then(()=>toast("Code copied!")).catch(()=>toast(S.fcode+" — copy manually"));break;}
    case "new-code":{S.fcode=genCode();ss("mp-fcode",S.fcode);startSync();renderM();toast("New code: "+S.fcode);break;}
    case "toggle-pause":{
      S.syncPaused=!S.syncPaused;ss("mp-paused",S.syncPaused);
      if(S.syncPaused){if(fbSrc){fbSrc.close();fbSrc=null;}S.fbStatus="paused";}
      else startSync();
      fbDot();renderM();toast(S.syncPaused?"Sync paused — you're safe to edit":"Sync resumed ✓");break;
    }
    case "push":{S.syncOpen=false;renderM();toast("Pushing to Firebase...");fbPush().then(()=>toast("Pushed ✓"));break;}
    case "pull":{S.syncOpen=false;renderM();fbPull(true);break;}
    case "join-code":{
      const inp=document.getElementById("join-code");
      const code=(inp?.value||"").trim().toUpperCase();
      if(code.length<4){toast("Enter a valid code",1);return;}
      S.fcode=code;ss("mp-fcode",code);S.syncOpen=false;renderM();
      toast("Switching to "+code+" and pulling...");
      setTimeout(()=>{startSync();fbPull(true);},300);break;
    }
  }
});

document.addEventListener("input",ev=>{
  const a=ev.target.dataset.a;
  switch(a){
    case "fb-ta":S.fb=ev.target.value;break;
    case "new-rule":S.newRule=ev.target.value;render();break;
    case "ni-name":S.niName=ev.target.value;break;
    case "ni-qty":S.niQty=ev.target.value;break;
    case "nd-name":S.ndName=ev.target.value;render();break;
    case "set-search":{
      S.setSearch=ev.target.value;
      const dl=document.getElementById("dish-list");
      if(dl){const all=getAllDishes();const SC={T:"#F97316",L:"#16A34A",D:"#3B82F6"};const SL={T:"Tiffin",L:"Lunch",D:"Dinner"};const sq=S.setSearch.toLowerCase();const dishes=Object.keys(all).filter(d=>!sq||d.toLowerCase().includes(sq)).sort();dl.innerHTML=rDishRows(dishes,all,SC,SL);}
      break;
    }
    case "srch-dish":{
      S.srchQ=ev.target.value;
      const dc=document.getElementById("dish-chips");
      if(dc&&S.editSlot){
        const all=getAllDishes();const {meal}=S.editSlot;
        const pool=meal==="tiffin"?Object.keys(all).filter(d=>all[d].dtype!=="dessert"&&all[d].dtype!=="condiment"):meal==="lunch"?Object.keys(all).filter(d=>all[d].slots.includes("L")):Object.keys(all).filter(d=>all[d].slots.includes("D"));
        const filt=pool.filter(d=>d.toLowerCase().includes(S.srchQ.toLowerCase())).sort();
        dc.innerHTML=filt.map(d=>e("span",{class:"chip"+(S.selDishes.includes(d)?" sel":""),"data-a":"tog-dish","data-dish":esc(d)},esc(d))).join("");
      }
      break;
    }
    case "qty":{S.shop=S.shop.map(it=>it.id===ev.target.dataset.id?{...it,qty:ev.target.value}:it);saveAll(false);break;}
  }
});

document.addEventListener("change",ev=>{
  const a=ev.target.dataset.a;
  if(a==="ni-unit")S.niUnit=ev.target.value;
  if(a==="nd-type")S.ndType=ev.target.value;
  if(a==="unit"){S.shop=S.shop.map(it=>it.id===ev.target.dataset.id?{...it,unit:ev.target.value}:it);saveAll(false);}
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Clear incompatible old data
try{
  const old=ls("mp-plan");
  if(old){
    const bad=!old.mon||old.mon.breakfast!==undefined||!("tiffin" in old.mon)||typeof old.mon!=="object";
    if(bad){
      ["mp-plan","mp-shop","mp-hist"].forEach(k=>localStorage.removeItem(k));
      S.plan=mkEmpty();S.ready=false;S.shop=[];S.history=[];
    }
  }
}catch{
  ["mp-plan","mp-shop","mp-hist"].forEach(k=>localStorage.removeItem(k));
  S.plan=mkEmpty();S.ready=false;S.shop=[];S.history=[];
}

// Auto-pull if no local data
if(!S.ready)setTimeout(()=>fbPull(true).catch(()=>{}),2000);

window.clearAndRestart=function(){
  ["mp-plan","mp-shop","mp-rules","mp-custom","mp-hist","mp-lp","mp-lpat","mp-freq","mp-drop"].forEach(k=>localStorage.removeItem(k));
  location.reload();
};
try{render();}catch(err){
  document.getElementById("app").innerHTML='<div style="padding:40px 20px;text-align:center"><p style="color:#EF4444;font-weight:700;margin-bottom:8px">Error: '+err.message+'</p><button onclick="window.clearAndRestart()" style="padding:10px 20px;background:#3B82F6;border:none;border-radius:10px;color:#fff;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif">Clear Data & Restart</button></div>';
}
startSync();
</script>
